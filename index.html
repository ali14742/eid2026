<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>نادي الأنصار - تهنئة العيد</title>
    <meta name="description" content="اصنع تهنئتك الخاصة من نادي الأنصار">
    <meta property="og:title" content="نادي الأنصار">
    <meta property="og:description" content="التهاني الخاصة">
    <meta property="og:image" content="0-02.jpg"> <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Almarai', sans-serif; text-align: center; background-color: #f0f2f0; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        canvas { max-width: 100%; height: auto; border-radius: 12px; margin-top: 20px; border: 1px solid #eee; }
        input { width: 90%; padding: 15px; margin: 15px 0; border: 2px solid #145c33; border-radius: 10px; font-size: 18px; text-align: center; outline: none; font-family: 'Almarai', sans-serif; }
        button { background-color: #145c33; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; width: 90%; font-family: 'Almarai', sans-serif; }
        button:hover { background-color: #0d3d22; }
        p { color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #145c33;">نادي الأنصار</h2>
    <p>تهنئة العيد</p>
    
    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا..." oninput="drawCanvas()">
    <canvas id="cardCanvas"></canvas>
    <button onclick="downloadImage()">تحميل التهنئة (صورة)</button>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();

    img.src = '0-02.jpg'; 

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        document.fonts.ready.then(drawCanvas);
    };

    function drawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        
        const name = document.getElementById('nameInput').value;
        const fontSize = canvas.width * 0.05; 
        
        ctx.fillStyle = "#ffffff"; 
        ctx.font = `bold ${fontSize}px 'Almarai', sans-serif`; 
        ctx.textAlign = "center";
        
        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.shadowBlur = 10;
        
        ctx.fillText(name, canvas.width / 2, canvas.height * 0.78); 
    }

    function downloadImage() {
        const imageData = canvas.toDataURL('image/png');
        
        // فحص ما إذا كان الجهاز يعمل بنظام iOS (آيفون أو آيباد)
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        if (isIOS) {
            // في الآيفون: نفتح الصورة في نافذة جديدة ليتمكن المستخدم من حفظها يدوياً
            const newWindow = window.open();
            newWindow.document.write('<div style="text-align:center; background:#f0f2f0; min-height:100vh; padding:20px;">');
            newWindow.document.write('<h2 style="font-family:sans-serif; color:#145c33;">اضغط مطولاً على الصورة ثم اختر "حفظ في الصور"</h2>');
            newWindow.document.write('<img src="' + imageData + '" style="width:100%; max-width:400px; border-radius:12px; box-shadow:0 10px 20px rgba(0,0,0,0.2);">');
            newWindow.document.write('</div>');
        } else {
            // في الأندرويد والكمبيوتر: التحميل التلقائي يعمل كالمعتاد
            const link = document.createElement('a');
            link.download = 'Al-Ansar-Greeting.png';
            link.href = imageData;
            link.click();
        }
    }
</script>

</body>
</html>
