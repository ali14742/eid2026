<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة نادي الأنصار</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f0f2f0; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        canvas { max-width: 100%; height: auto; border-radius: 12px; margin-top: 20px; border: 1px solid #eee; }
        input { width: 90%; padding: 15px; margin: 15px 0; border: 2px solid #145c33; border-radius: 10px; font-size: 18px; text-align: center; outline: none; }
        button { background-color: #145c33; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; width: 90%; }
        button:hover { background-color: #0d3d22; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #145c33;">صانع تهنئة الأنصار</h2>
    <p>اكتب اسمك في المربع أدناه ثم قم بتحميل الصورة</p>
    <input type="text" id="nameInput" placeholder="اكتب الاسم هنا..." oninput="drawCanvas()">
    <canvas id="cardCanvas"></canvas>
    <button onclick="downloadImage()">تحميل التهنئة (صورة)</button>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();

    // تأكد أن الصورة المرفوعة في GitHub تحمل هذا الاسم تماماً
    img.src = '0-02.jpg'; 

    img.onload = function() {
        // تعيين أبعاد الكانفاس لتطابق أبعاد الصورة الحقيقية (1080x1920)
        canvas.width = img.width;
        canvas.height = img.height;
        drawCanvas();
    };

    function drawCanvas() {
        // مسح الكانفاس ورسم الخلفية
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        
        const name = document.getElementById('nameInput').value;
        
        // إعدادات الخط: الحجم (8% من عرض الصورة) ليناسب دقة 72 DPI
        const fontSize = canvas.width * 0.08; 
        
        ctx.fillStyle = "#ffffff"; 
        ctx.font = `bold ${fontSize}px Arial`; 
        ctx.textAlign = "center";
        
        // إضافة ظل ناعم خلف الاسم لزيادة الوضوح
        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.shadowBlur = 12;
        ctx.shadowOffsetX = 4;
        ctx.shadowOffsetY = 4;
        
        // وضع الاسم في المنتصف الرأسي بين المخطوطة وشريط الشعارات
        // تم ضبط الارتفاع ليكون بنسبة 78% من إجمالي طول الصورة
        ctx.fillText(name, canvas.width / 2, canvas.height * 0.78); 
    }

    function downloadImage() {
        const link = document.createElement('a');
        // تسمية الملف المحمل باسم احترافي
        link.download = 'Al-Ansar-Eid-Greeting.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
