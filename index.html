<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة نادي الأنصار</title>
    <!-- استدعاء خط Almarai الاحترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Almarai', sans-serif; text-align: center; background-color: #f0f2f0; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        canvas { max-width: 100%; height: auto; border-radius: 12px; margin-top: 20px; border: 1px solid #eee; }
        input { width: 90%; padding: 15px; margin: 15px 0; border: 2px solid #145c33; border-radius: 10px; font-size: 18px; text-align: center; outline: none; font-family: 'Almarai', sans-serif; }
        button { background-color: #145c33; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; width: 90%; font-family: 'Almarai', sans-serif; }
        button:hover { background-color: #0d3d22; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #145c33;">صانع تهنئة الأنصار</h2>
    <p>اكتب اسمك في المربع أدناه وسيتغير الخط في التصميم تلقائياً</p>
    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا..." oninput="drawCanvas()">
    <canvas id="cardCanvas"></canvas>
    <button onclick="downloadImage()">تحميل التهنئة (صورة)</button>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();

    // تأكد أن اسم الصورة في GitHub هو 0-02.jpg
    img.src = '0-02.jpg'; 

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        // ننتظر تحميل الخط قبل البدء بالرسم
        document.fonts.ready.then(drawCanvas);
    };

    function drawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        
        const name = document.getElementById('nameInput').value;
        
        // حجم الخط المصغر (0.065 من عرض الصورة)
        const fontSize = canvas.width * 0.065; 
        
        ctx.fillStyle = "#ffffff"; 
        ctx.font = `bold ${fontSize}px 'Almarai', sans-serif`; 
        ctx.textAlign = "center";
        
        // إعدادات الظل لبروز الاسم
        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.shadowBlur = 10;
        ctx.shadowOffsetX = 4;
        ctx.shadowOffsetY = 4;
        
        // وضع الاسم في المنتصف (بنسبة 78% من الارتفاع)
        ctx.fillText(name, canvas.width / 2, canvas.height * 0.78); 
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'Al-Ansar-Greeting.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
